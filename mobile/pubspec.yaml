name: familygram
description: A private, invite-only family photo feed.
publish_to: 'none'
version: 1.4.2+12

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  dio: ^5.7.0
  flutter_secure_storage: ^9.2.2
  image_picker: ^1.1.2
  image: ^4.3.0
  cached_network_image: ^3.4.1
  go_router: ^14.6.2
  intl: ^0.19.0
  flutter_web_auth_2: ^4.1.0
  local_auth: ^2.3.0
  url_launcher: ^6.3.1
  share_plus: ^10.1.4
  path_provider: ^2.1.5
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^18.0.1
  flutter_image_compress: ^2.3.0

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.3

flutter:
  uses-material-design: true

# Generate the iOS icon set from a single 1024×1024 source PNG.
# Source PNG is produced by `dart run tool/generate_icon.dart`.
# Apply it by running:        dart run flutter_launcher_icons
flutter_launcher_icons:
  ios: true
  android: "launcher_icon"
  image_path: "assets/icon/icon.png"
  remove_alpha_ios: true
  # Android 8+ adaptive icon: navy background, polaroid mark as foreground.
  adaptive_icon_background: "#1E3A5F"
  adaptive_icon_foreground: "assets/icon/icon.png"

# Boot splash: solid navy (matches the icon background), with the stacked-
# polaroids mark centred. Apply with:  dart run flutter_native_splash:create
flutter_native_splash:
  color: "#1E3A5F"
  image: "assets/icon/icon.png"
  ios_content_mode: center
  fullscreen: false
  android_12:
    color: "#1E3A5F"
    image: "assets/icon/icon.png"
